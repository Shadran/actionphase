# Production override for Docker Compose
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database - Production Config
  db:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups  # Mount for backup scripts
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API - Production Config
  backend:
    # Remove external port mapping - nginx will proxy to internal port 3000
    # Note: Empty array doesn't override - we rely on 'expose' in base file
    ports: !reset []
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: info
      # CORS for production domain
      CORS_ORIGINS: "https://${DOMAIN:-action-phase.com},http://localhost"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # Mount for file uploads if needed
    volumes:
      - ./uploads:/root/uploads

  # Frontend - Production Config
  frontend:
    # Remove external port mapping - nginx will proxy to internal port 80
    # Note: Empty array doesn't override - we rely on 'expose' in base file
    ports: !reset []
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: actionphase-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    command: /bin/sh -c "apk add --no-cache gettext && envsubst '\$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf.template:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      # SSL certificates
      - ./ssl/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
      - ./ssl/default.crt:/etc/nginx/ssl/default.crt:ro
      - ./ssl/default.key:/etc/nginx/ssl/default.key:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - actionphase-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot for SSL Certificate Management
  certbot:
    image: certbot/certbot
    container_name: actionphase-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # No default entrypoint - use docker-compose run for manual operations
    # Automatic renewal is handled by cron job (see scripts/setup-ssl.sh)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; done;'"
    networks:
      - actionphase-network

volumes:
  letsencrypt:
    driver: local
  certbot-webroot:
    driver: local
