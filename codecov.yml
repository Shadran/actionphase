# Codecov Configuration
# See: https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%  # Allow 1% drop in coverage
        base: auto
        if_ci_failed: error

    patch:
      default:
        target: 80%  # New code should have 80% coverage
        threshold: 5%
        base: auto
        if_ci_failed: error

  flags:
    backend:
      paths:
        - backend/
      carryforward: true
    frontend:
      paths:
        - frontend/src/
      carryforward: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true
  show_carryforward_flags: true

ignore:
  - "frontend/src/**/*.test.tsx"
  - "frontend/src/**/*.test.ts"
  - "frontend/src/test-utils/**"
  - "frontend/src/mocks/**"
  - "frontend/e2e/**"
  - "backend/**/*_test.go"
  - "backend/pkg/db/models/**"
  - "backend/pkg/docs/**"
  - "docs-site/**"
  # Test infrastructure files — helpers used by tests, not production code
  - "backend/pkg/core/test_utils.go"
  - "backend/pkg/core/test_factories.go"
  - "backend/pkg/core/test_best_practices_example.go"
  - "backend/pkg/core/mocks.go"
  - "backend/pkg/core/repository_mocks.go"
  - "backend/pkg/core/repository_mocks_simple.go"
  - "backend/pkg/core/test_helpers.go"
  - "backend/pkg/http/test_helpers.go"
  - "backend/pkg/http/root.go"
