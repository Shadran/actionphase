openapi: 3.0.3
info:
  title: ActionPhase API
  description: |
    ActionPhase is a specialized platform for running play-by-post RPG games that alternate between two distinct phases:
    - **Common Room Phase**: Asynchronous, Reddit-style threaded discussions where players interact in-character
    - **Action Phase**: Players submit private moves to the Game Master, who processes and publishes results

    This API provides access to game management, character creation, and phase management functionality.
  version: 1.0.0
  contact:
    name: ActionPhase Development Team
    url: https://github.com/actionphase/actionphase
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.action-phase.com/api/v1
    description: Production server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Error Response Schema
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          description: User-friendly status message
          example: "Bad request."
        code:
          type: integer
          format: int64
          description: Application-specific error code
          example: 1001
        error:
          type: string
          description: Detailed error message for debugging
          example: "username already exists"
      required:
        - status

    # User Schemas
    User:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 123
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "gamemaster_alex"
        email:
          type: string
          format: email
          example: "alex@example.com"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - username
        - email

    # Authentication Schemas
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "gamemaster_alex"
        password:
          type: string
          minLength: 8
          example: "secure_password123"
      required:
        - username
        - password

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "new_player"
        email:
          type: string
          format: email
          example: "player@example.com"
        password:
          type: string
          minLength: 8
          example: "secure_password123"
      required:
        - username
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      required:
        - user
        - token

    # Game Schemas
    Game:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 456
        title:
          type: string
          minLength: 3
          maxLength: 255
          example: "The Chronicles of Eldoria"
        description:
          type: string
          minLength: 10
          example: "A high-fantasy RPG campaign set in the mystical realm of Eldoria"
        gm_user_id:
          type: integer
          format: int32
          example: 123
        state:
          type: string
          enum: [setup, recruitment, character_creation, in_progress, paused, completed, cancelled]
          example: "recruitment"
        genre:
          type: string
          example: "Fantasy RPG"
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        recruitment_deadline:
          type: string
          format: date-time
          nullable: true
        max_players:
          type: integer
          format: int32
          minimum: 1
          maximum: 20
          example: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - gm_user_id
        - state

    GameWithDetails:
      allOf:
        - $ref: '#/components/schemas/Game'
        - type: object
          properties:
            current_players:
              type: integer
              format: int64
              example: 4
            gm_username:
              type: string
              example: "gamemaster_alex"
            is_public:
              type: boolean
              example: true

    CreateGameRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
          example: "The Chronicles of Eldoria"
        description:
          type: string
          minLength: 10
          example: "A high-fantasy RPG campaign set in the mystical realm of Eldoria"
        genre:
          type: string
          example: "Fantasy RPG"
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        recruitment_deadline:
          type: string
          format: date-time
          nullable: true
        max_players:
          type: integer
          format: int32
          minimum: 1
          maximum: 20
          example: 6
      required:
        - title
        - description

    UpdateGameRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        description:
          type: string
          minLength: 10
        genre:
          type: string
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        recruitment_deadline:
          type: string
          format: date-time
          nullable: true
        max_players:
          type: integer
          format: int32
          minimum: 1
          maximum: 20
        is_public:
          type: boolean

    UpdateGameStateRequest:
      type: object
      properties:
        state:
          type: string
          enum: [setup, recruitment, character_creation, in_progress, paused, completed, cancelled]
          example: "in_progress"
      required:
        - state

    GameParticipant:
      type: object
      properties:
        user_id:
          type: integer
          format: int32
        username:
          type: string
        role:
          type: string
          enum: [player, audience, gm]
          example: "player"
        joined_at:
          type: string
          format: date-time

    # Game Application Schemas
    GameApplication:
      type: object
      properties:
        id:
          type: integer
          format: int32
        game_id:
          type: integer
          format: int32
        user_id:
          type: integer
          format: int32
        username:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time

    ApplyToGameRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 10
          example: "I'm an experienced player looking to join a fantasy campaign"
      required:
        - message

    ReviewApplicationRequest:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
        response_message:
          type: string
          nullable: true
      required:
        - status

    # Character Schemas
    Character:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 789
        game_id:
          type: integer
          format: int32
          example: 456
        user_id:
          type: integer
          format: int32
          nullable: true
          example: 123
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Elara Moonwhisper"
        character_type:
          type: string
          enum: [pc, npc, audience_npc]
          example: "pc"
          description: |
            - pc: Player Character (controlled by a player)
            - npc: Non-Player Character (GM-controlled)
            - audience_npc: Audience-controlled NPC
        status:
          type: string
          enum: [pending_approval, approved, active, inactive, dead]
          example: "approved"
          description: |
            - pending_approval: Character awaiting GM approval
            - approved: Character approved but not yet active
            - active: Character actively participating in game
            - inactive: Character temporarily inactive
            - dead: Character is deceased
        avatar_url:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/avatars/elara.jpg"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - game_id
        - name
        - character_type
        - status

    CharacterWithUser:
      allOf:
        - $ref: '#/components/schemas/Character'
        - type: object
          properties:
            username:
              type: string
              nullable: true
              example: "player_alex"

    CreateCharacterRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Elara Moonwhisper"
        character_type:
          type: string
          enum: [pc, npc, audience_npc]
          example: "pc"
        user_id:
          type: integer
          format: int32
          nullable: true
          description: Optional - for GMs to assign player characters to specific players
          example: 123
      required:
        - name
        - character_type

    CharacterData:
      type: object
      properties:
        id:
          type: integer
          format: int32
        character_id:
          type: integer
          format: int32
        module_type:
          type: string
          example: "attributes"
          description: Category of character data (e.g., attributes, skills, inventory)
        field_name:
          type: string
          example: "strength"
        field_value:
          type: string
          example: "18"
        field_type:
          type: string
          example: "number"
          description: Data type of the field (string, number, boolean, etc.)
        is_public:
          type: boolean
          example: true
          description: Whether this field is visible to all players or private
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CharacterDataRequest:
      type: object
      properties:
        module_type:
          type: string
          example: "attributes"
        field_name:
          type: string
          example: "strength"
        field_value:
          type: string
          example: "18"
        field_type:
          type: string
          example: "number"
        is_public:
          type: boolean
          example: true
      required:
        - module_type
        - field_name
        - field_type

    # Phase Schemas
    Phase:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 101
        game_id:
          type: integer
          format: int32
          example: 456
        phase_type:
          type: string
          enum: [action, common_room]
          example: "action"
          description: |
            - action: Action phase where players submit private moves to GM
            - common_room: Common room phase for threaded discussions
        phase_number:
          type: integer
          format: int32
          example: 1
          description: Sequential phase number within the game
        title:
          type: string
          nullable: true
          example: "Phase 1: The Journey Begins"
        description:
          type: string
          nullable: true
          example: "Players begin their quest in the village of Oakshire"
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
          description: For action phases - when submissions are due
        is_active:
          type: boolean
          example: true
          description: Only one phase per game can be active at a time
        time_remaining:
          type: integer
          format: int64
          nullable: true
          description: Seconds until deadline (calculated field)
        is_expired:
          type: boolean
          description: Whether the deadline has passed (calculated field)
        created_at:
          type: string
          format: date-time
      required:
        - id
        - game_id
        - phase_type
        - phase_number

    CreatePhaseRequest:
      type: object
      properties:
        phase_type:
          type: string
          enum: [action, common_room]
          example: "action"
        title:
          type: string
          example: "Phase 1: The Journey Begins"
        description:
          type: string
          example: "Players begin their quest in the village of Oakshire"
        start_time:
          type: string
          format: date-time
          nullable: true
        end_time:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
      required:
        - phase_type

    # Action Submission Schemas
    Action:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 201
        game_id:
          type: integer
          format: int32
          example: 456
        user_id:
          type: integer
          format: int32
          example: 123
        phase_id:
          type: integer
          format: int32
          example: 101
        character_id:
          type: integer
          format: int32
          nullable: true
          example: 789
        content:
          type: string
          example: "I search the ancient library for clues about the artifact"
        submitted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - game_id
        - user_id
        - phase_id
        - content

    ActionWithDetails:
      allOf:
        - $ref: '#/components/schemas/Action'
        - type: object
          properties:
            username:
              type: string
              example: "player_alex"
            character_name:
              type: string
              nullable: true
              example: "Elara Moonwhisper"
            phase_type:
              type: string
              nullable: true
              example: "action"
            phase_number:
              type: integer
              format: int32
              nullable: true
              example: 1

    SubmitActionRequest:
      type: object
      properties:
        character_id:
          type: integer
          format: int32
          nullable: true
          example: 789
        content:
          type: string
          minLength: 1
          example: "I search the ancient library for clues about the artifact"
        is_draft:
          type: boolean
          default: false
          description: If true, saves as draft without finalizing submission
      required:
        - content

    # Action Result Schemas
    ActionResult:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 301
        game_id:
          type: integer
          format: int32
          example: 456
        user_id:
          type: integer
          format: int32
          example: 123
          description: The player receiving this result
        phase_id:
          type: integer
          format: int32
          example: 101
        character_id:
          type: integer
          format: int32
          nullable: true
          example: 789
        action_submission_id:
          type: integer
          format: int32
          nullable: true
          example: 201
          description: Reference to the original action submission
        gm_user_id:
          type: integer
          format: int32
          example: 100
          description: The GM who created this result
        content:
          type: string
          example: "You discover an ancient tome with cryptic symbols"
        is_published:
          type: boolean
          example: true
          description: Whether this result has been published to the player
        sent_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - game_id
        - user_id
        - phase_id
        - gm_user_id
        - content
        - is_published

    ActionResultWithDetails:
      allOf:
        - $ref: '#/components/schemas/ActionResult'
        - type: object
          properties:
            username:
              type: string
              example: "player_alex"
            character_name:
              type: string
              example: "Elara Moonwhisper"
            gm_username:
              type: string
              example: "gamemaster_bob"
            phase_type:
              type: string
              example: "action"
            phase_number:
              type: integer
              format: int32
              example: 1

    CreateActionResultRequest:
      type: object
      properties:
        user_id:
          type: integer
          format: int32
          example: 123
          description: The player to receive this result
        character_id:
          type: integer
          format: int32
          nullable: true
          example: 789
        action_submission_id:
          type: integer
          format: int32
          nullable: true
          example: 201
        content:
          type: string
          minLength: 1
          example: "You discover an ancient tome with cryptic symbols"
        is_published:
          type: boolean
          default: false
          description: Whether to immediately publish to the player
      required:
        - user_id
        - content

    # Post (Common Room Message) Schemas
    Post:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 401
        game_id:
          type: integer
          format: int32
          example: 456
        phase_id:
          type: integer
          format: int32
          nullable: true
          example: 101
        author_id:
          type: integer
          format: int32
          example: 123
        character_id:
          type: integer
          format: int32
          example: 789
        content:
          type: string
          example: "The village elder seems to be hiding something..."
        message_type:
          type: string
          enum: [post, comment]
          example: "post"
        author_username:
          type: string
          example: "player_alex"
        character_name:
          type: string
          example: "Elara Moonwhisper"
        character_avatar_url:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/avatars/elara.jpg"
        comment_count:
          type: integer
          format: int64
          example: 3
          description: Number of comments on this post
        is_edited:
          type: boolean
          example: false
        is_deleted:
          type: boolean
          example: false
        mentioned_character_ids:
          type: array
          items:
            type: integer
            format: int32
          example: [790, 791]
          description: IDs of characters mentioned in this post
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - game_id
        - author_id
        - character_id
        - content
        - message_type

    CreatePostRequest:
      type: object
      properties:
        phase_id:
          type: integer
          format: int32
          nullable: true
          description: Optional - associate post with specific phase
        character_id:
          type: integer
          format: int32
          example: 789
        content:
          type: string
          minLength: 1
          example: "The village elder seems to be hiding something..."
      required:
        - character_id
        - content

    UpdatePostRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          example: "The village elder seems to be hiding something... I should investigate."
      required:
        - content

    # Comment Schemas
    Comment:
      allOf:
        - $ref: '#/components/schemas/Post'
        - type: object
          properties:
            parent_id:
              type: integer
              format: int32
              example: 401
              description: ID of the parent post or comment
            thread_depth:
              type: integer
              format: int32
              example: 1
              description: Depth in the comment thread (0 = top-level post)
            reply_count:
              type: integer
              format: int64
              example: 2
              description: Number of direct replies to this comment

    CreateCommentRequest:
      type: object
      properties:
        phase_id:
          type: integer
          format: int32
          nullable: true
        character_id:
          type: integer
          format: int32
          example: 789
        content:
          type: string
          minLength: 1
          example: "I agree, we should approach cautiously."
      required:
        - character_id
        - content

    UpdateCommentRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          example: "I agree, we should approach cautiously and bring backup."
        character_id:
          type: integer
          format: int32
          nullable: true
          description: Optional - for switching which character posted the comment
      required:
        - content

    # Session Management Schemas
    SessionInfo:
      type: object
      properties:
        id:
          type: string
          example: "sess_abc123def456"
          description: Session identifier
        device_info:
          type: string
          nullable: true
          example: "Chrome 120.0 on macOS"
          description: Browser and OS information
        ip_address:
          type: string
          example: "192.168.1.1"
          description: IP address from which session was created
        last_active:
          type: string
          format: date-time
          description: Last time this session was used
        is_current:
          type: boolean
          example: true
          description: Whether this is the current session
        created_at:
          type: string
          format: date-time
      required:
        - id
        - last_active
        - is_current

    # Password Reset Schemas
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "player@example.com"
      required:
        - email

    PasswordResetConfirm:
      type: object
      properties:
        token:
          type: string
          example: "reset_token_abc123xyz789"
          description: Password reset token from email
        new_password:
          type: string
          minLength: 8
          example: "new_secure_password123"
          description: New password (minimum 8 characters)
      required:
        - token
        - new_password

    PasswordChangeRequest:
      type: object
      properties:
        current_password:
          type: string
          example: "old_password123"
          description: Current password for verification
        new_password:
          type: string
          minLength: 8
          example: "new_secure_password123"
          description: New password (minimum 8 characters)
      required:
        - current_password
        - new_password

    TokenValidation:
      type: object
      properties:
        valid:
          type: boolean
          example: true
          description: Whether the reset token is valid
        message:
          type: string
          example: "Token is valid"
          description: Human-readable validation message
      required:
        - valid
        - message

    # Notification Schemas
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 501
        user_id:
          type: integer
          format: int32
          example: 123
        type:
          type: string
          enum: [game_invite, character_approved, phase_started, action_result_published, new_post, new_comment, deadline_reminder]
          example: "character_approved"
          description: |
            Notification types:
            - game_invite: Invited to join a game
            - character_approved: Character approved by GM
            - phase_started: New game phase has started
            - action_result_published: GM published action results
            - new_post: New post in common room
            - new_comment: Comment on your post or mention
            - deadline_reminder: Action phase deadline approaching
        title:
          type: string
          example: "Character Approved"
          description: Short notification title
        message:
          type: string
          example: "Your character 'Elara Moonwhisper' has been approved by the Game Master"
          description: Notification message body
        link:
          type: string
          nullable: true
          example: "/games/456/characters/789"
          description: Optional link to related resource
        read:
          type: boolean
          example: false
          description: Whether notification has been read
        created_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - type
        - title
        - message
        - read

    NotificationList:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
          format: int64
          example: 42
          description: Total number of notifications
        page:
          type: integer
          format: int32
          example: 1
          description: Current page number
        page_size:
          type: integer
          format: int32
          example: 20
          description: Number of items per page
        has_more:
          type: boolean
          example: true
          description: Whether more pages are available
      required:
        - notifications
        - total
        - page
        - page_size
        - has_more

    UnreadCount:
      type: object
      properties:
        count:
          type: integer
          format: int64
          example: 5
          description: Number of unread notifications
      required:
        - count

    # Dashboard Schemas
    Deadline:
      type: object
      properties:
        game_id:
          type: integer
          format: int32
          example: 456
        game_title:
          type: string
          example: "The Chronicles of Eldoria"
        phase_id:
          type: integer
          format: int32
          example: 101
        phase_number:
          type: integer
          format: int32
          example: 1
        deadline:
          type: string
          format: date-time
          description: When the deadline occurs
        time_remaining:
          type: integer
          format: int64
          description: Seconds until deadline
      required:
        - game_id
        - game_title
        - phase_id
        - phase_number
        - deadline
        - time_remaining

    DashboardData:
      type: object
      properties:
        active_games:
          type: array
          items:
            $ref: '#/components/schemas/Game'
          description: Games the user is currently playing
        recruiting_games:
          type: array
          items:
            $ref: '#/components/schemas/Game'
          description: Games open for recruitment
        recent_notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
          description: Last 5 notifications
        unread_count:
          type: integer
          format: int64
          example: 3
          description: Total unread notification count
        my_pending_actions:
          type: integer
          format: int64
          example: 2
          description: Number of action submissions needed
        upcoming_deadlines:
          type: array
          items:
            $ref: '#/components/schemas/Deadline'
          description: Next 3 approaching deadlines
      required:
        - active_games
        - recruiting_games
        - recent_notifications
        - unread_count
        - my_pending_actions
        - upcoming_deadlines

    # Handout Schemas
    Handout:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 601
        game_id:
          type: integer
          format: int32
          example: 456
        title:
          type: string
          example: "World Map of Eldoria"
          description: Handout title
        content:
          type: string
          example: "![Map](https://example.com/map.jpg)\n\nThis ancient map shows..."
          description: Handout content in markdown format
        is_published:
          type: boolean
          example: true
          description: Whether handout is visible to players (false = draft)
        author_user_id:
          type: integer
          format: int32
          example: 100
          description: User ID of creator (typically GM)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - game_id
        - title
        - content
        - is_published
        - author_user_id

    HandoutWithAuthor:
      allOf:
        - $ref: '#/components/schemas/Handout'
        - type: object
          properties:
            author_username:
              type: string
              example: "gamemaster_alex"

    CreateHandoutRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: "World Map of Eldoria"
        content:
          type: string
          minLength: 1
          example: "![Map](https://example.com/map.jpg)\n\nThis ancient map shows..."
          description: Handout content in markdown format
        is_published:
          type: boolean
          default: false
          description: Whether to publish immediately (default is draft)
      required:
        - title
        - content

    UpdateHandoutRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        is_published:
          type: boolean

    # Game Logs Schemas
    GameLog:
      type: object
      properties:
        id:
          type: integer
          format: int32
        game_id:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time

paths:
  # Health Check
  /ping:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Simple health check to verify API is running
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            text/plain:
              schema:
                type: string
                example: "ponger"

  # Authentication Endpoints
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account and receive an authentication token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login with username/password and receive authentication token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    get:
      tags:
        - Authentication
      summary: Refresh authentication token
      description: Get a new authentication token using existing valid token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: |
        Clear JWT cookie and invalidate the current session.
        After logout, the authentication token will no longer be valid.
        The user will need to login again to access protected endpoints.
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successfully logged out"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: |
        Get information about the currently authenticated user.
        Useful for verifying authentication status and retrieving user details.
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/request-password-reset:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: |
        Request a password reset email with a secure token.
        Business rules:
        - Sends email with reset link containing token
        - Token expires after 1 hour
        - Rate limited to prevent abuse (max 3 requests per hour per email)
        - Returns success even if email not found (security best practice)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset email sent (if account exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If an account exists with that email, a password reset link has been sent"
        '400':
          description: Invalid email format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password with token
      description: |
        Reset password using the token received via email.
        Requirements:
        - Valid reset token (not expired or already used)
        - New password must be at least 8 characters
        - Token is invalidated after successful reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password successfully reset"
        '400':
          description: Invalid or expired token, or invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/validate-reset-token:
    get:
      tags:
        - Authentication
      summary: Validate password reset token
      description: |
        Check if a password reset token is valid before showing the reset form.
        Returns validation status without consuming the token.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: Password reset token from email
          schema:
            type: string
            example: "reset_token_abc123xyz789"
      responses:
        '200':
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenValidation'
        '400':
          description: Token parameter missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password (authenticated)
      description: |
        Change password for the currently authenticated user.
        Requirements:
        - Must provide correct current password
        - New password must be at least 8 characters
        - New password must be different from current password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password successfully changed"
        '400':
          description: Invalid request (new password same as old, too short, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions:
    get:
      tags:
        - Authentication
      summary: List active sessions
      description: |
        Get all active sessions for the current user.
        Session information includes:
        - Device and browser information
        - IP address
        - Last active timestamp
        - Which session is current

        Sessions automatically expire after 30 days of inactivity.
      responses:
        '200':
          description: List of active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/{sessionId}:
    delete:
      tags:
        - Authentication
      summary: Revoke session
      description: |
        Revoke a specific session by ID.
        Use this to logout from other devices or browsers.
        Cannot revoke the current session (use /auth/logout instead).
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Session ID to revoke
          schema:
            type: string
            example: "sess_abc123def456"
      responses:
        '200':
          description: Session revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Session revoked successfully"
        '400':
          description: Cannot revoke current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found or doesn't belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Game Management Endpoints
  /games/public:
    get:
      tags:
        - Games
      summary: Get all public games
      description: Retrieve a list of all public games
      responses:
        '200':
          description: List of public games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'

  /games/recruiting:
    get:
      tags:
        - Games
      summary: Get games currently recruiting
      description: Retrieve games that are actively recruiting new players
      responses:
        '200':
          description: List of recruiting games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'

  /games:
    post:
      tags:
        - Games
      summary: Create a new game
      description: Create a new RPG game. Only authenticated users can create games.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}:
    get:
      tags:
        - Games
      summary: Get game by ID
      description: Retrieve detailed information about a specific game
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Games
      summary: Update game
      description: Update game information. Only the game master can update their games.
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
      responses:
        '200':
          description: Game updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can update game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Games
      summary: Delete game
      description: Delete a game. Only the game master can delete their games.
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Game deleted successfully
        '403':
          description: Only game master can delete game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/details:
    get:
      tags:
        - Games
      summary: Get game with detailed information
      description: Retrieve comprehensive game information including participant count and GM details
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Game details with additional information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameWithDetails'

  /games/{id}/state:
    put:
      tags:
        - Games
      summary: Update game state
      description: Change the game's current state (e.g., from recruitment to in_progress)
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameStateRequest'
      responses:
        '200':
          description: Game state updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can update game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/participants:
    get:
      tags:
        - Games
      summary: Get game participants
      description: Retrieve list of all participants in the game
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of game participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameParticipant'

  /games/{id}/leave:
    delete:
      tags:
        - Games
      summary: Leave game
      description: Remove yourself from a game you're participating in
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Successfully left the game
        '400':
          description: Cannot leave game (e.g., game master, game in progress)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Game Application Endpoints
  /games/{id}/apply:
    post:
      tags:
        - Game Applications
      summary: Apply to join game
      description: Submit an application to join a game during recruitment phase
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyToGameRequest'
      responses:
        '201':
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameApplication'
        '400':
          description: Invalid application or game not accepting applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/applications:
    get:
      tags:
        - Game Applications
      summary: Get game applications
      description: Get all applications for a game (GM only)
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameApplication'
        '403':
          description: Only game master can view applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/applications/{applicationId}/review:
    put:
      tags:
        - Game Applications
      summary: Review application
      description: Approve or reject a game application (GM only)
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: applicationId
          in: path
          required: true
          description: Application ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewApplicationRequest'
      responses:
        '200':
          description: Application reviewed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameApplication'
        '403':
          description: Only game master can review applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{id}/application:
    delete:
      tags:
        - Game Applications
      summary: Withdraw application
      description: Withdraw your pending application to join a game
      parameters:
        - name: id
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Application withdrawn successfully
        '404':
          description: No pending application found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Character Endpoints
  /games/{gameId}/characters:
    get:
      tags:
        - Characters
      summary: List game characters
      description: |
        Get all characters in a game. Returns different information based on the requester's role:
        - GM: Can see all characters including NPCs and character data
        - Player: Can see approved/active characters and their own pending characters
        - Public: Can see only active player characters
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterWithUser'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Characters
      summary: Create character
      description: |
        Create a new character in the game. Character creation rules:
        - Players can create PC characters (requires GM approval)
        - GMs can create any character type and assign to specific users
        - Character names must be unique within the game
        - New characters start in 'pending_approval' status (or 'approved' if created by GM)
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '201':
          description: Character created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Invalid request (e.g., duplicate character name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to create characters in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Character Management Endpoints (ID-specific operations)
  /characters/{id}:
    get:
      tags:
        - Characters
      summary: Get character details
      description: Get detailed information about a specific character
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Character details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Characters
      summary: Delete character
      description: |
        Delete a character (GM only). Characters can only be deleted if they have no activity in the game.
        For characters with activity, use reassignment or mark as inactive instead.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Character deleted successfully
        '403':
          description: Only GM can delete characters or character has activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/approve:
    post:
      tags:
        - Characters
      summary: Approve character
      description: |
        Approve a pending character (GM only). Approving a character:
        - Changes status from 'pending_approval' to 'approved'
        - Makes the character active in the game
        - Notifies the player that their character was approved
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Character approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Character is not in pending status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can approve characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/assign:
    post:
      tags:
        - Characters
      summary: Assign NPC to player
      description: |
        Assign an NPC character to a player (GM only). This allows a GM to give control
        of an NPC to a specific player. The character must be an NPC type.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: integer
                  format: int32
                  description: ID of the user to assign the NPC to
      responses:
        '200':
          description: NPC assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Character is not an NPC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can assign NPCs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/reassign:
    put:
      tags:
        - Characters
      summary: Reassign inactive character
      description: |
        Reassign an inactive character to a new player (GM only). Used when a player
        leaves the game or goes inactive. The character must be in inactive status.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_user_id
              properties:
                new_user_id:
                  type: integer
                  format: int32
                  description: ID of the new user to assign the character to
      responses:
        '200':
          description: Character reassigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Character is not inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can reassign characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/rename:
    put:
      tags:
        - Characters
      summary: Rename character
      description: |
        Rename a character. GM can rename any character, players can only rename their own
        pending characters before approval.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: New character name (must be unique within game)
      responses:
        '200':
          description: Character renamed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Invalid name or name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to rename this character
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/data:
    get:
      tags:
        - Characters
      summary: Get character data
      description: |
        Get the character's custom data (character sheet, stats, etc.).
        Visibility depends on user's role and game settings.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Character data
          content:
            application/json:
              schema:
                type: object
                description: Custom character data (structure defined by game)
        '403':
          description: Not authorized to view this character's data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Characters
      summary: Update character data
      description: |
        Update the character's custom data. GM can update any character, players can
        only update their own characters. The data structure is game-specific.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Character data to update (game-specific structure)
      responses:
        '200':
          description: Character data updated successfully
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid data format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to update this character's data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /characters/{id}/avatar:
    post:
      tags:
        - Characters
      summary: Upload character avatar
      description: |
        Upload an avatar image for a character. The image is stored in S3 and a URL is returned.
        Supported formats: JPEG, PNG, GIF. Max size: 5MB.
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file to upload
      responses:
        '200':
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string
                    format: uri
                    description: URL of the uploaded avatar
        '400':
          description: Invalid file format or size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to update this character's avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Characters
      summary: Delete character avatar
      description: Remove the avatar image from a character
      parameters:
        - name: id
          in: path
          required: true
          description: Character ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Avatar deleted successfully
        '403':
          description: Not authorized to delete this character's avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Phase Endpoints
  /games/{gameId}/phases:
    post:
      tags:
        - Phases
      summary: Create new phase
      description: |
        Create a new phase in the game (GM only). Phase creation rules:
        - Only GMs can create phases
        - Phase number is automatically assigned sequentially
        - New phase is created in inactive state
        - Only one phase can be active at a time
        - Phase types: 'action' (players submit moves) or 'common_room' (discussion)
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePhaseRequest'
      responses:
        '201':
          description: Phase created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phase'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can create phases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/current-phase:
    get:
      tags:
        - Phases
      summary: Get active phase
      description: |
        Get the currently active phase for a game. Returns phase details including:
        - Phase type (action or common_room)
        - Deadline information (if applicable)
        - Time remaining until deadline
        - Phase number and title

        Only one phase can be active at a time per game.
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Current active phase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phase'
        '404':
          description: Game not found or no active phase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Phase Management Endpoints (ID-specific operations)
  /phases/{id}:
    put:
      tags:
        - Phases
      summary: Update phase
      description: |
        Update phase details (GM only). Can update title, description, and other phase properties.
        Cannot change phase type or status - use specific endpoints for those operations.
      parameters:
        - name: id
          in: path
          required: true
          description: Phase ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                  description: Phase title
                description:
                  type: string
                  description: Phase description
      responses:
        '200':
          description: Phase updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phase'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can update phases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Phase not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Phases
      summary: Delete phase
      description: |
        Delete a phase (GM only). Phases can only be deleted if they:
        - Are not currently active
        - Have no submitted actions or posts
        Typically used to remove accidentally created or empty phases.
      parameters:
        - name: id
          in: path
          required: true
          description: Phase ID
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Phase deleted successfully
        '400':
          description: Phase cannot be deleted (has activity or is active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can delete phases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Phase not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phases/{id}/activate:
    post:
      tags:
        - Phases
      summary: Activate phase
      description: |
        Activate a phase (GM only). Activating a phase:
        - Deactivates any currently active phase
        - Publishes results from the previous phase (if applicable)
        - Makes this phase the current active phase
        - Notifies all players that a new phase has started

        Only one phase can be active at a time per game.
      parameters:
        - name: id
          in: path
          required: true
          description: Phase ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Phase activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phase'
        '400':
          description: Phase cannot be activated (e.g., already active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can activate phases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Phase not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phases/{id}/deadline:
    put:
      tags:
        - Phases
      summary: Update phase deadline
      description: |
        Update or set the deadline for a phase (GM only). Deadlines are used for action phases
        to indicate when players must submit their actions. Common room phases typically don't
        have deadlines.

        Can extend or shorten deadlines for active phases. Players are notified of changes.
      parameters:
        - name: id
          in: path
          required: true
          description: Phase ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deadline:
                  type: string
                  format: date-time
                  description: New deadline (ISO 8601 format). Set to null to remove deadline.
                  nullable: true
      responses:
        '200':
          description: Deadline updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Phase'
        '400':
          description: Invalid deadline (e.g., in the past)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can update deadlines
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Phase not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Action Submission Endpoints
  /games/{gameId}/actions:
    post:
      tags:
        - Actions
      summary: Submit player action
      description: |
        Submit an action during an action phase. Action submission rules:
        - Can only submit during active action phase
        - One action per player per phase
        - Can save as draft and update before deadline
        - Submitting a non-draft finalizes the action
        - Actions are private (only visible to player and GM)
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitActionRequest'
      responses:
        '201':
          description: Action submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          description: Invalid request (e.g., no active action phase)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to submit actions in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/actions/mine:
    get:
      tags:
        - Actions
      summary: Get my action submissions
      description: |
        Get all action submissions for the authenticated player in this game.
        Returns actions across all phases with details including:
        - Submission content
        - Phase information
        - Submission status (draft or submitted)
        - Character association
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of player's action submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionWithDetails'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to view actions in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Action Result Endpoints
  /games/{gameId}/results:
    post:
      tags:
        - Action Results
      summary: Create action result
      description: |
        Create an action result for a player (GM only). Action result rules:
        - Only GMs can create results
        - Results can be saved as draft (unpublished) or published immediately
        - Can include character updates that are applied when published
        - Results are sent to specific players
        - Can optionally reference the original action submission
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionResultRequest'
      responses:
        '201':
          description: Action result created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResult'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can create action results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found or referenced entities not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/results/mine:
    get:
      tags:
        - Action Results
      summary: Get my action results
      description: |
        Get all published action results for the authenticated player in this game.
        Returns only results where is_published=true.
        Includes GM responses to player actions across all phases.
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of player's action results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionResultWithDetails'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to view results in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Common Room Post Endpoints
  /games/{gameId}/posts:
    get:
      tags:
        - Common Room
      summary: List common room posts
      description: |
        Get all top-level posts in the game's common room.
        Returns posts in reverse chronological order (newest first).
        Includes comment counts and character information.
        Posts are threaded discussions visible to all game participants.
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: Maximum number of posts to return (default 50)
          schema:
            type: integer
            format: int32
            default: 50
        - name: offset
          in: query
          description: Number of posts to skip for pagination (default 0)
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '200':
          description: List of common room posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Common Room
      summary: Create common room post
      description: |
        Create a new post in the game's common room.
        Post creation rules:
        - Must post as a character (character_id required)
        - Character must be approved and belong to the game
        - Posts are visible to all game participants
        - Can mention other characters using @CharacterName
        - Supports markdown formatting
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Invalid request (e.g., invalid character)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to post in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game or character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/posts/{postId}/comments:
    get:
      tags:
        - Common Room
      summary: Get post comments
      description: |
        Get all comments for a specific post in threaded order.
        Returns nested comment structure with reply counts.
        Comments are limited to 10 levels of nesting.
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: postId
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          description: Game or post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Common Room
      summary: Create comment on post
      description: |
        Add a comment to a post or reply to another comment.
        Comment creation rules:
        - Must comment as a character
        - Character must be approved and belong to the game
        - Comments can be nested up to 10 levels deep
        - Can mention other characters
        - Supports markdown formatting
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: postId
          in: path
          required: true
          description: Post ID (or parent comment ID)
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Invalid request (e.g., max depth exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to comment in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game, post, or character not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Notification Endpoints
  /notifications:
    get:
      tags:
        - Notifications
      summary: List user notifications
      description: |
        Get paginated list of notifications for the authenticated user.
        Notifications include game invites, character approvals, phase changes,
        action results, common room activity, and deadline reminders.

        Notifications are automatically deleted after 30 days.
        Returns newest notifications first.
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Number of notifications per page
          schema:
            type: integer
            format: int32
            default: 20
            minimum: 1
            maximum: 100
        - name: unread_only
          in: query
          description: Only return unread notifications
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationList'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: Get unread notification count
      description: |
        Get the count of unread notifications for the current user.
        Useful for displaying notification badges in the UI.
      responses:
        '200':
          description: Unread notification count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCount'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/mark-all-read:
    put:
      tags:
        - Notifications
      summary: Mark all notifications as read
      description: |
        Mark all notifications for the current user as read.
        This is an idempotent operation - safe to call multiple times.
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "All notifications marked as read"
                  count:
                    type: integer
                    format: int64
                    example: 12
                    description: Number of notifications updated
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}:
    get:
      tags:
        - Notifications
      summary: Get single notification
      description: |
        Get a specific notification by ID.
        Only returns notifications belonging to the authenticated user.
      parameters:
        - name: id
          in: path
          required: true
          description: Notification ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Notification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found or doesn't belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}/mark-read:
    put:
      tags:
        - Notifications
      summary: Mark notification as read
      description: |
        Mark a specific notification as read.
        This is an idempotent operation - safe to call multiple times.
      parameters:
        - name: id
          in: path
          required: true
          description: Notification ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found or doesn't belong to current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Dashboard Endpoint
  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Get user dashboard
      description: |
        Get comprehensive dashboard data for the authenticated user.

        Returns:
        - Active games (games user is playing)
        - Recruiting games (games open for applications)
        - Recent notifications (last 5)
        - Unread notification count
        - Pending actions count (action submissions needed)
        - Upcoming deadlines (next 3 approaching deadlines)

        This is an optimized endpoint that aggregates data from multiple
        services into a single response for efficient dashboard rendering.
      responses:
        '200':
          description: User dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardData'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Handout Endpoints
  /games/{gameId}/handouts:
    get:
      tags:
        - Handouts
      summary: List game handouts
      description: |
        Get all handouts for a game.

        Visibility rules:
        - GMs can see all handouts (including drafts)
        - Players can only see published handouts
        - Handouts are returned in reverse chronological order (newest first)

        Handouts are reference documents like maps, rules clarifications,
        character backgrounds, or world lore provided by the GM.
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of handouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HandoutWithAuthor'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to view handouts in this game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Handouts
      summary: Create handout
      description: |
        Create a new handout for the game (GM only).

        Creation rules:
        - Only GMs can create handouts
        - Handouts support markdown formatting
        - Can be created as draft (unpublished) or published immediately
        - Draft handouts are only visible to the GM
        - Published handouts are visible to all game participants
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHandoutRequest'
      responses:
        '201':
          description: Handout created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handout'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can create handouts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/handouts/{handoutId}:
    get:
      tags:
        - Handouts
      summary: Get single handout
      description: |
        Get a specific handout by ID.

        Visibility rules:
        - GMs can view all handouts (including drafts)
        - Players can only view published handouts
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: handoutId
          in: path
          required: true
          description: Handout ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Handout details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandoutWithAuthor'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized to view this handout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game or handout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /games/{gameId}/handouts/{handoutId}/publish:
    post:
      tags:
        - Handouts
      summary: Publish handout
      description: |
        Publish a draft handout to make it visible to all players (GM only).

        Publishing rules:
        - Only GMs can publish handouts
        - Once published, handout becomes visible to all game participants
        - This is an idempotent operation - safe to call on already published handouts
        - Cannot unpublish a handout (use update endpoint to set is_published=false)
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
        - name: handoutId
          in: path
          required: true
          description: Handout ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Handout published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handout'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only game master can publish handouts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Game or handout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Logs Endpoints
  /games/{gameId}/logs:
    get:
      tags:
        - Game Logs
      summary: Get game logs
      description: Get all logs for a game (GM only while the game is running)
      parameters:
        - name: gameId
          in: path
          required: true
          description: Game ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameLog'
        '403':
          description: Only game master can view logs while the game is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Health
    description: API health and status endpoints
  - name: Authentication
    description: User authentication and session management
  - name: Games
    description: Game creation, management, and participation
  - name: Game Applications
    description: Application system for joining games
  - name: Game Logs
    description: Game logs to view the game timeline
  - name: Characters
    description: Character creation, management, and character sheet data
  - name: Phases
    description: Game phase management (action and common room phases)
  - name: Actions
    description: Player action submission during action phases
  - name: Action Results
    description: GM responses to player actions
  - name: Common Room
    description: Threaded discussion posts and comments in the common room
  - name: Notifications
    description: User notification system for game events and updates
  - name: Dashboard
    description: Aggregated dashboard data for user overview
  - name: Handouts
    description: Game reference documents and lore provided by Game Masters
