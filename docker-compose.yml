services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: actionphase-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: actionphase
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/pkg/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d actionphase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - actionphase-network

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actionphase-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override specific values that need Docker-specific configuration
      DATABASE_URL: "postgres://postgres:example@db:5432/actionphase?sslmode=disable"
      PORT: 3000
      HOST: 0.0.0.0
      RUN_MIGRATIONS: "true"
    volumes:
      - uploads:/root/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - actionphase-network

  # React Frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass VITE_ prefixed variables from .env to frontend build
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY:-}
        VITE_HCAPTCHA_ENABLED: ${VITE_HCAPTCHA_ENABLED:-false}
    container_name: actionphase-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - uploads:/usr/share/nginx/html/uploads
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - actionphase-network

networks:
  actionphase-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
